diagnostic_aggregator:
  ros__parameters:
    analyzers:
      base:
        type: diagnostic_aggregator/GenericAnalyzer
        path: Base
        contains: [base, motor, encoder, estop]
      power:
        type: diagnostic_aggregator/GenericAnalyzer
        path: Power
        contains: [battery, rail, bms]
      sensors:
        type: diagnostic_aggregator/GenericAnalyzer
        path: Sensors
        contains: [lidar, camera, imu]
