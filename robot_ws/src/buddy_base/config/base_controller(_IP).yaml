base_controller:
  ros__parameters:
    command_timeout_ms: 200
    max_linear_velocity_mps: 0.30
    max_angular_velocity_radps: 0.60
    wheel_radius_m: 0.08
    wheel_separation_m: 0.49
    left_wheel_joints:
      - left_front_wheel_joint
      - left_rear_wheel_joint
    right_wheel_joints:
      - right_front_wheel_joint
      - right_rear_wheel_joint
    transport: TBD_CAN_or_serial_or_micro_ros
